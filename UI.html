<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Times New Roman', serif;
}

body {
  height: 100vh;
  background: linear-gradient(90deg, #f07f92, #f6c17f);
  display: flex;
  align-items: center;
  justify-content: center;
}

.wrapper {
  width: 95%;
  max-width: 1500px;
  height: 90vh;
  display: flex;
  gap: 40px;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: rgba(255,255,255,0.35);
  padding: 40px 35px;
  border-radius: 35px;
  backdrop-filter: blur(8px);
}

.sidebar h2 {
  margin-bottom: 35px;
  font-size: 22px;
}

.sidebar ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 25px; /* more spacing */
}

.sidebar a {
  text-decoration: none;
  color: black;
  font-weight: 500;
  transition: 0.2s ease;
}

.sidebar a:hover {
  transform: translateX(6px);
  opacity: 0.7;
}

/* ===== MAIN AREA ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
  color: white;
}

.main h1 {
  font-size: 42px;
  font-weight: 700;
}

/* TOP ROW */
.top-row {
  display: flex;
  gap: 35px;
}

/* CARDS */
.card,
.widget {
  background: #ead3c6;
  border-radius: 35px;
  padding: 35px; /* more internal space */
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  text-decoration: none;
  color: black;
  transition: all 0.25s ease;
  display: block;
  cursor: pointer;
}

/* Hover Animation */
.card:hover,
.widget:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0,0,0,0.18);
}

/* proportions */
.report {
  flex: 1;
  height: 200px;
}

.graph {
  flex: 2;
  height: 200px;
}

.goals {
  height: 300px;
}

/* ===== RIGHT SIDE ===== */
.right {
  width: 270px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 35px;
}

.widget {
  height: 220px;
}

h3 {
  margin-bottom: 12px;
  font-size: 20px;
}

p {
  font-size: 15px;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Dashboard</h2>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="journal.html">Journal</a></li>
      <li><a href="meditation.html">Meditation</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1>Welcome [Name]!</h1>

    <div class="top-row">
      <a href="report.html" class="card report">
        <h3>Completion Report</h3>
        <p>Click to enlarge</p>
      </a>

      <a href="graph.html" class="card graph">
        <h3>Graph</h3>
        <p>Click to enlarge</p>
      </a>
    </div>

    <a href="goals.html" class="card goals">
      <h3>Daily Goals!</h3>
      <p>Click to enlarge</p>
    </a>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <a href="music.html" class="widget">
      <h3>Music Rec</h3>
      <p>Click to enlarge<br>Spotify API</p>
    </a>

    <a href="chatbot.html" class="widget">
      <h3>Chatbot</h3>
      <p>Click to enlarge<br>ChatGPT API<br>ElevenLabs API</p>
    </a>
  </div>

</div>

</body>
</html>
